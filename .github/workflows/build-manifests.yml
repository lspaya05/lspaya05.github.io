name: build-manifests

# Regenerate content/<collection>/manifest.json whenever content changes, so
# adding a project/post is just "drop a .md and push".
on:
  push:
    paths:
      - "content/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-manifests
  cancel-in-progress: true

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate manifests
        run: node .github/scripts/build-manifests.mjs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --cached --quiet || git commit -m "chore: regenerate content manifests [skip ci]"
          git push
        # Pushes made with the default GITHUB_TOKEN do not retrigger workflows,
        # so this cannot loop.
