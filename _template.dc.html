<!DOCTYPE html>
<!--
  NEW TAB TEMPLATE. Clean URLs come from one index.html per folder, e.g. a
  "Photos" tab lives at photos/index.html and is served at <site>/photos/.
  To create it:
    1. Copy this file to photos/index.html  (the folder name IS the URL)
    2. Copy js/pages/_Template.js to js/pages/Photos.js, set its key to "photos"
    3. Update the page-module <script src> + the four 'NEWPAGE' strings below
    4. Add items as folders: content/photos/<slug>/index.md (manifest auto-generated by CI)
    5. Add { "key":"photos", "label":"Photos", "href":"photos/" } to
       content/site.config.json -> sections  (the nav renders from config)
  <base href="../"> is depth-relative: this page is ONE folder deep, so "../"
  points at the site root, keeping ./support.js, ./js/* and content/* resolving
  there regardless of where the site is hosted. (A two-deep page would use "../../".)
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="../">
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/base.css">
<script src="./support.js"></script>
<script src="./js/app.js"></script>
<script src="./js/pages/_Template.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @media (max-width:900px){ #tplGrid{grid-template-columns:repeat(2,1fr) !important;} }
  @media (max-width:600px){ #tplGrid{grid-template-columns:1fr !important;} }
</style>
</helmet>

<div style="font-family:var(--ui); min-height:100vh;">

  <!-- set active="photos" (your section key) so the nav highlights this tab -->
  <dc-import name="SiteNav" active="NEWPAGE" hint-size="100%,62px"></dc-import>

  <section style="max-width:var(--mw); margin:0 auto; padding:64px 32px 28px;">
    <h1 style="font-family:var(--display); font-size:clamp(38px,5vw,60px); margin:0; letter-spacing:-0.02em; color:var(--ink);">New Tab</h1>
    <p style="font-family:var(--display); font-size:clamp(20px,2.2vw,26px); line-height:1.4; color:var(--text-ghost); max-width:640px; margin:18px 0 0; text-wrap:pretty;">A short intro. (Move this into content/NEWPAGE/page.md and bind it if you like.)</p>
  </section>

  <section style="max-width:var(--mw); margin:0 auto; padding:0 32px 74px;">
    <div id="tplGrid" style="margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:18px;">
      <sc-for list="{{ items }}" as="it" hint-placeholder-count="6">
        <a href="#" style="display:block; background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,0.02);" style-hover="border-color:var(--border-strong); box-shadow:0 6px 18px rgba(0,0,0,0.05);">
          <div style="position:relative; overflow:hidden; height:150px; background:repeating-linear-gradient(135deg,#edeae4 0 10px,#f5f3ee 10px 20px); display:flex; align-items:center; justify-content:center;">
            <span style="font-family:ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:0.1em; color:var(--text-placeholder); text-transform:uppercase;">{{ it.art }}</span>{{ it.cover }}
          </div>
          <div style="padding:18px 20px 22px;">
            <div style="font-family:var(--display); font-size:24px; letter-spacing:-0.01em; margin:0 0 8px; color:var(--ink);">{{ it.name }}</div>
            <div style="font-family:var(--ui); font-size:14px; line-height:1.55; color:var(--text-muted);">{{ it.blurb }}</div>
          </div>
        </a>
      </sc-for>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,200px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 800 } }">
// Rename 'NEWPAGE' to your section key (must match js/pages and content/<key>/).
class Component extends DCLogic {
  state = Site.initialState('NEWPAGE');
  componentDidMount(){ Site.mount(this, 'NEWPAGE'); }
  componentDidUpdate(p){ Site.updated(this, 'NEWPAGE', p); }
  componentWillUnmount(){ Site.unmount(this, 'NEWPAGE'); }
  renderVals(){ return Site.render(this, 'NEWPAGE'); }
}
</script>
</body>
</html>
