<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header id="siteHeader" style="position:fixed; top:0; left:0; right:0; z-index:50; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); background:rgba(247,246,243,0.72); border-bottom:1px solid rgba(0,0,0,0.045); transition:background .35s ease, border-color .35s ease, backdrop-filter .35s ease;">
  <div style="max-width:var(--mw,1180px); margin:0 auto; padding:13px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px;">
    <a id="siteBrand" href="{{ brandHref }}" style="font-family:var(--display); font-size:22px; font-weight:500; letter-spacing:-0.01em; color:#1f1d1a; transition:opacity .35s ease, transform .35s ease;">{{ brand }}</a>
    <nav id="siteNav" style="position:relative; display:flex; align-items:center; gap:2px; background:#ffffff; border:1px solid #e7e4de; border-radius:999px; padding:5px 6px; box-shadow:0 1px 2px rgba(0,0,0,0.03);">
      <div id="navHighlight" style="position:absolute; top:5px; bottom:5px; left:0; width:0; border-radius:999px; background:#f1efe9; opacity:0; transition:left .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1), opacity .2s ease; pointer-events:none; z-index:0;"></div>
      <sc-for list="{{ links }}" as="l" hint-placeholder-count="5">
        <a data-key="{{ l.key }}" href="{{ l.href }}" style="position:relative; z-index:1; font-family:var(--ui); font-size:14px; padding:7px 15px; border-radius:999px; color:#74706a; font-weight:500; transition:color .2s ease;">{{ l.label }}</a>
      </sc-for>
    </nav>
  </div>
</header>
<div aria-hidden="true" style="height:70px;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 62 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;projects&quot;, &quot;thoughts&quot;, &quot;reading&quot;, &quot;misc&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  state = { links: null, brand: 'Leonard', brandHref: '.', wired: false };
  componentDidMount(){
    Site.config().then(cfg => {
      const home = (cfg.sections || []).find(s => s.key === 'home') || (cfg.sections || [])[0];
      this.setState({
        links: cfg.sections || [],
        brand: cfg.brand || 'Leonard',
        brandHref: home ? home.href : '.'
      });
    }).catch(e => console.error('[nav] config load failed', e));
    this._onScroll = (e) => this._scroll(e);
    window.addEventListener('scroll', this._onScroll, { passive: true });
    window.addEventListener('scroll', this._onScroll, true);
    document.addEventListener('scroll', this._onScroll, true);
    this._scroll();
  }
  componentWillUnmount(){
    window.removeEventListener('scroll', this._onScroll, { passive: true });
    window.removeEventListener('scroll', this._onScroll, true);
    document.removeEventListener('scroll', this._onScroll, true);
  }
  componentDidUpdate(){
    if(!this.state.wired && this._links().length){ this._wire(); this.state.wired = true; }
    this._paintActive();
  }
  active(){ return this.props.active || 'home'; }
  _links(){ const nav = document.getElementById('siteNav'); return nav ? [...nav.querySelectorAll('a[data-key]')] : []; }
  _paintActive(){
    const a = this.active();
    this._links().forEach(el => {
      const on = el.dataset.key === a;
      el.style.color = on ? '#1f1d1a' : '#74706a';
      el.style.fontWeight = on ? '700' : '500';
    });
  }
  _moveTo(el, hl){ hl.style.left = el.offsetLeft + 'px'; hl.style.width = el.offsetWidth + 'px'; }
  _wire(){
    const nav = document.getElementById('siteNav');
    const hl = document.getElementById('navHighlight');
    if(!nav || !hl) return;
    const links = this._links();
    links.forEach(el => {
      el.addEventListener('mouseenter', () => { this._moveTo(el, hl); hl.style.opacity = '1'; el.style.color = '#1f1d1a'; });
    });
    nav.addEventListener('mouseleave', () => { hl.style.opacity = '0'; this._paintActive(); });
    // seat the highlight under the active link (hidden) so the first hover slides naturally
    const act = links.find(el => el.dataset.key === this.active()) || links[0];
    if(act) this._moveTo(act, hl);
    this._paintActive();
  }
  _scroll(e){
    const header = document.getElementById('siteHeader');
    const brand = document.getElementById('siteBrand');
    if(!header) return;
    const t = e && e.target;
    const ty = (t && typeof t.scrollTop === 'number') ? t.scrollTop : 0;
    const y = Math.max(window.scrollY || 0, document.documentElement.scrollTop || 0, document.body.scrollTop || 0, ty);
    const s = y > 40;
    header.style.background = s ? 'rgba(247,246,243,0)' : 'rgba(247,246,243,0.72)';
    header.style.borderBottomColor = s ? 'rgba(0,0,0,0)' : 'rgba(0,0,0,0.045)';
    header.style.backdropFilter = s ? 'none' : 'blur(10px)';
    header.style.webkitBackdropFilter = s ? 'none' : 'blur(10px)';
    if(brand){
      brand.style.opacity = s ? '0' : '1';
      brand.style.transform = s ? 'translateY(-6px)' : 'none';
      brand.style.pointerEvents = s ? 'none' : 'auto';
    }
  }
  renderVals(){
    return {
      links: this.state.links || [],
      brand: this.state.brand,
      brandHref: this.state.brandHref
    };
  }
}
</script>
</body>
</html>
